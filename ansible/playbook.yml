---
- name: Deploy NGINX web server
  hosts: web
  become: true
  gather_facts: false

  tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Install NGINX
      ansible.builtin.dnf:
        name: nginx
        state: present

    - name: Deploy landing page
      ansible.builtin.copy:
        dest: /usr/share/nginx/html/index.html
        mode: "0644"
        content: |
          <!doctype html>
          <html>
            <head><title>Minimal NGINX</title></head>
            <body>
              <h1>NGINX is running</h1>
              <p>Provisioned with Terraform, configured with Ansible.</p>
            </body>
          </html>

    - name: Enable and start NGINX
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
