---
# Use-Case #4 — retrieve a Delinea Secret Server secret with the Ansible
# community.general.tss lookup plugin.
#
# Docs: https://docs.delinea.com/online-help/integrations/redhat/ansible-secret-server/ansible-integration-ansible-config.htm
#
# Like the other use-cases in this repo, the secret is a Secret Server secret
# whose template exposes the AWS credentials under the field slugs `access-key`
# and `secret-key`. The lookup runs on the control node at runtime; nothing
# sensitive is written to disk or source control.
#
# Requirements (control node):
#   ansible-galaxy collection install community.general
#   # Install the SDK into the SAME interpreter Ansible runs under:
#   #   python -m pip install python-tss-sdk
#   # If Ansible is a Homebrew install, that interpreter is its bundled venv,
#   # e.g. /opt/homebrew/Cellar/ansible/<ver>/libexec/bin/python -m pip install python-tss-sdk
#   # Find it with: ansible --version | grep 'python version'
#
# macOS note: Python's fork safety can crash the lookup worker with
#   "A worker was found in a dead state". Export the following before running:
#   export OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES
#
# Authentication — supply EITHER an OAuth bearer token OR username/password.
# Pass everything at runtime via -e / the environment so no secret is committed:
#
#   # Token auth (matches use-cases #1 and #3):
#   export TSS_TOKEN="<out-of-band bearer token>"
#   ansible-playbook retrieve-secret.yml \
#     -e tss_server_url="https://<tenant>.secretservercloud.com" \
#     -e tss_secret_id=75
#
#   # Username/password auth:
#   ansible-playbook retrieve-secret.yml \
#     -e tss_server_url="https://<tenant>.secretservercloud.com" \
#     -e tss_secret_id=75 \
#     -e tss_username=app_account -e tss_password='<password>'

- name: Retrieve a secret from Delinea Secret Server
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Non-secret settings. Override with -e or environment variables.
    tss_server_url: "{{ lookup('ansible.builtin.env', 'TSS_SERVER_URL') | default('https://tenant.secretservercloud.com', true) }}"
    tss_secret_id: "{{ lookup('ansible.builtin.env', 'TSS_SECRET_ID') | default(75, true) }}"
    tss_token: "{{ lookup('ansible.builtin.env', 'TSS_TOKEN') | default('', true) }}"
    tss_username: "{{ lookup('ansible.builtin.env', 'TSS_USERNAME') | default('', true) }}"
    tss_password: "{{ lookup('ansible.builtin.env', 'TSS_PASSWORD') | default('', true) }}"

    # Field slugs on the secret template (same as the rest of the repo).
    access_key_slug: access-key
    secret_key_slug: secret-key

  tasks:
    - name: Validate that credentials were provided
      ansible.builtin.assert:
        that:
          - tss_token | length > 0 or (tss_username | length > 0 and tss_password | length > 0)
        fail_msg: >-
          Provide either TSS_TOKEN (bearer token) or both TSS_USERNAME and
          TSS_PASSWORD. See the header comment for examples.

    # The lookup returns the full secret object. Passing token= uses the
    # Thycotic authorizer; passing username=/password= performs the OAuth2
    # Access Grant. Only the relevant kwargs are non-empty at any time.
    #
    # In its default path the tss lookup calls the SDK's get_secret_json(),
    # which returns a JSON-formatted *string*, and returns it inside a
    # one-element list. So: query() preserves that list, `| first` takes the
    # element (the JSON string), and `| from_json` parses it into the dict the
    # later tasks index with tss_secret['items'].
    - name: Fetch the secret from Secret Server
      ansible.builtin.set_fact:
        tss_secret: >-
          {{
            (query('community.general.tss',
                   tss_secret_id,
                   base_url=tss_server_url,
                   token=tss_token,
                   username=tss_username,
                   password=tss_password) | first | from_json)
          }}
      no_log: true

    # Flatten the items[] list into a {slug: value} dict for easy field access.
    - name: Extract AWS credential fields by slug
      ansible.builtin.set_fact:
        aws_access_key: "{{ fields[access_key_slug] }}"
        aws_secret_key: "{{ fields[secret_key_slug] }}"
      vars:
        fields: "{{ tss_secret['items'] | items2dict(key_name='slug', value_name='itemValue') }}"
      no_log: true

    - name: Confirm retrieval without revealing the values
      ansible.builtin.debug:
        msg:
          - "Secret {{ tss_secret_id }} retrieved from {{ tss_server_url }}"
          - "access-key field length: {{ aws_access_key | length }}"
          - "secret-key field length: {{ aws_secret_key | length }}"

    # Example downstream use: hand the fetched credentials to a task without
    # ever persisting them. Registered output is suppressed with no_log.
    - name: Validate the credentials against AWS STS
      ansible.builtin.command:
        cmd: aws sts get-caller-identity --output json
      environment:
        AWS_ACCESS_KEY_ID: "{{ aws_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ aws_secret_key }}"
        AWS_DEFAULT_REGION: "{{ lookup('ansible.builtin.env', 'AWS_REGION') | default('us-east-1', true) }}"
      register: sts_result
      changed_when: false
      no_log: true

    - name: Report STS validation result
      ansible.builtin.debug:
        msg: "AWS credentials are valid (caller identity retrieved)."
      when: sts_result.rc == 0
