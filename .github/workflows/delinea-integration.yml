name: Delinea Secret via GitHub Actions
run-name: ${{ github.actor }} is requesting secret from Delinea 🚀
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Preflight - verify secrets are present (no values printed)
        env:
          DPSS_SERVER_URL: ${{ secrets.DPSS_SERVER_URL }}
          DPSS_CLIENT_ID: ${{ secrets.DPSS_CLIENT_ID }}
          DPSS_CLIENT_SECRET: ${{ secrets.DPSS_CLIENT_SECRET }}
        run: |
          echo "DPSS_SERVER_URL length:    ${#DPSS_SERVER_URL}"
          echo "DPSS_CLIENT_ID length:     ${#DPSS_CLIENT_ID}"
          echo "DPSS_CLIENT_SECRET length: ${#DPSS_CLIENT_SECRET}"
          # Length 0 means the secret is not set in this repo/environment scope.
          if [ -z "$DPSS_SERVER_URL" ] || [ -z "$DPSS_CLIENT_ID" ] || [ -z "$DPSS_CLIENT_SECRET" ]; then
            echo "::error::One or more DPSS secrets are empty in this scope."
            exit 1
          fi

      - name: Preflight - list secret field slugs (Delinea Platform flow)
        env:
          DPSS_SERVER_URL: ${{ secrets.DPSS_SERVER_URL }}
          DPSS_CLIENT_ID: ${{ secrets.DPSS_CLIENT_ID }}
          DPSS_CLIENT_SECRET: ${{ secrets.DPSS_CLIENT_SECRET }}
        run: |
          PLATFORM="${DPSS_SERVER_URL%/}"
          # Secret Server API host for this tenant (platform host -> SS cloud host).
          SS_URL="$(echo "$PLATFORM" | sed 's/\.delinea\.app/.secretservercloud.com/')"
          echo "Platform host: $PLATFORM"
          echo "Secret Server host: $SS_URL"

          # 1. Platform client_credentials token (the flow the container uses).
          TOKEN=$(curl -s -X POST "$PLATFORM/identity/api/oauth2/token/xpmplatform" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=${DPSS_CLIENT_ID}" \
            --data-urlencode "client_secret=${DPSS_CLIENT_SECRET}" \
            --data-urlencode "scope=xpmheadless" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::warning::Could not obtain platform token in preflight (does not block the run)."
            exit 0
          fi
          echo "Platform token: acquired"

          # 2. Read secret 75 and print each field's name + slug so we know the
          #    exact value to use for "secretKey".
          echo "--- available fields on secret 75 (fieldName -> slug) ---"
          curl -s -H "Authorization: Bearer $TOKEN" "$SS_URL/api/v1/secrets/75" \
            | jq -r '.items[]? | "\(.fieldName)  ->  slug=\(.slug)"' \
            || echo "(could not list fields)"

      - name: Retrieve secrets from Delinea
        env:
          DPSS_SERVER_URL: ${{ secrets.DPSS_SERVER_URL }}
          DPSS_CLIENT_ID: ${{ secrets.DPSS_CLIENT_ID }}
          DPSS_CLIENT_SECRET: ${{ secrets.DPSS_CLIENT_SECRET }}
          DPSS_RETRIEVE: |
            [
              {"secretId":"75","secretKey":"access-key","outputVariable":"AWS_ACCESS_KEY"}
            ]
        run: |
          # Pass secrets via -e VAR (no "=value") so their values come from the
          # step environment and are NEVER rendered into the shell command string.
          # This eliminates truncation/mangling from special characters.
          docker run --rm \
            -e DPSS_SERVER_URL \
            -e DPSS_CLIENT_ID \
            -e DPSS_CLIENT_SECRET \
            -e DELINEA_RETRIEVE="$DPSS_RETRIEVE" \
            -e GITHUB_ENV=/github_env \
            -v "$GITHUB_ENV:/github_env" \
            delineaxpm/dpss-github-action:latest

      - name: Mask retrieved secrets in logs
        run: |
          echo "::add-mask::$AWS_ACCESS_KEY"

      - name: Use the retrieved secrets
        run: |
          echo "AWS Access Key: $AWS_ACCESS_KEY"